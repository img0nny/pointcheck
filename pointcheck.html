<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2차전 팀 확인 및 최종 점수</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; color: white; }
        .title-font { font-family: 'Black Han Sans', sans-serif; }
        .comic-font { font-family: 'Jua', sans-serif; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .pop-up { animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .btn-glow { box-shadow: 0 0 20px rgba(236, 72, 153, 0.4); }
        .btn-glow-blue { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }
        .rank-badge { background: #334155; }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
    </style>
</head>
<body class="relative">

    <div id="app" class="w-full max-w-5xl mx-auto p-4 md:p-8 flex-1 flex flex-col">
        <!-- 초기 로딩 화면 -->
        <div class="flex-1 flex justify-center items-center text-slate-400 text-lg font-bold flex-col gap-4 pt-20">
            <div class="text-5xl animate-spin comic-font">🌀</div>
            <p class="animate-pulse">데이터를 불러오고 있습니다...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlrDE_xgT6VBwEQ7AtqEkPfIng6tuK38g",
            authDomain: "img0nny.firebaseapp.com",
            projectId: "img0nny",
            storageBucket: "img0nny.firebasestorage.app",
            messagingSenderId: "28395677092",
            appId: "1:28395677092:web:603c15d52699f0fe03cd31"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const teamDocRef = doc(db, "bowling_event", "teams");
        const resultDocRef = doc(db, "bowling_event", "round2_results");

        window.currentView = null;
        window.playersData = []; 
        window.localScores = JSON.parse(localStorage.getItem('round1_scores_by_name')) || {};
        window.round2Scores = JSON.parse(localStorage.getItem('round2_actual_scores_by_name')) || {};
        window.currentTeams = null; 

        const appDiv = document.getElementById('app');

        onSnapshot(teamDocRef, (docSnap) => {
            if (docSnap.exists()) {
                const cards = docSnap.data().cards;
                let fetchedNames = [];
                for(let i=1; i<=16; i++) {
                    if(cards[i] && cards[i].owner) fetchedNames.push(cards[i].owner);
                }
                while(fetchedNames.length < 16) fetchedNames.push("");
                
                let hasChanged = JSON.stringify(window.playersData) !== JSON.stringify(fetchedNames);
                if (hasChanged) {
                    window.playersData = fetchedNames;
                    if(window.currentView === 'input' || !window.currentView) window.renderInputScreen();
                }
            } else {
                window.playersData = Array(16).fill("");
                if(!window.currentView) window.renderInputScreen();
            }
        });

        window.saveScore = function(name, value) {
            if(!name) return;
            window.localScores[name] = value;
            localStorage.setItem('round1_scores_by_name', JSON.stringify(window.localScores));
        };

        window.saveRound2Score = function(name, value) {
            if(!name) return;
            window.round2Scores[name] = value;
            localStorage.setItem('round2_actual_scores_by_name', JSON.stringify(window.round2Scores));
        };

        window.renderInputScreen = function() {
            window.currentView = 'input';
            let inputsHTML = '';
            window.playersData.forEach((playerName, index) => {
                const currentScore = (playerName && window.localScores[playerName] !== undefined) ? window.localScores[playerName] : '';
                const isWaiting = !playerName;
                inputsHTML += `
                    <div class="bg-slate-800/80 p-5 rounded-2xl border border-slate-600 flex flex-col gap-3 shadow-lg ${isWaiting ? 'opacity-40 grayscale' : 'hover:border-pink-500'} transition-colors">
                        <input type="text" id="name_${index}" value="${playerName}" class="w-full bg-transparent ${isWaiting ? 'text-slate-500' : 'text-white'} font-black text-2xl md:text-3xl border-b border-slate-600 outline-none pb-2 comic-font text-center cursor-default" placeholder="[ 대기 중 ]" readonly>
                        <div class="flex items-center gap-2 mt-1">
                            <input type="number" id="score_${index}" value="${currentScore}" oninput="window.saveScore('${playerName}', this.value)" class="w-full bg-slate-900 ${isWaiting ? 'text-slate-600' : 'text-blue-400'} font-black text-3xl text-center rounded-lg py-3 outline-none border border-slate-700 focus:border-blue-500 transition-colors" placeholder="점수" ${isWaiting ? 'disabled' : ''}>
                            <span class="text-slate-400 font-bold whitespace-nowrap">점</span>
                        </div>
                    </div>
                `;
            });

            appDiv.innerHTML = `
                <div class="text-center mb-8 fade-in pt-6">
                    <p class="text-blue-400 font-bold tracking-widest mb-2 comic-font text-xl">스마트 AI 밸런스 배정</p>
                    <h1 class="text-4xl md:text-5xl title-font text-white mb-4 leading-tight">1차전 점수 입력</h1>
                    <p class="text-slate-400 text-sm bg-slate-800/50 inline-block px-4 py-2 rounded-full border border-slate-700">
                        1차전 점수를 입력하면 가장 공정한 <strong class="text-blue-400">황금 팀 밸런스</strong>를 자동 계산합니다.
                    </p>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-4 md:gap-5 mb-10 fade-in">
                    ${inputsHTML}
                </div>
                <div class="flex flex-col items-center gap-5 pb-12 fade-in">
                    <button onclick="window.calculateTeams()" class="btn-glow-blue bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-black py-4 px-12 rounded-full text-xl hover:scale-105 active:scale-95 transition-all w-full md:w-auto shadow-xl">
                        ⚖️ 2차전 팀 구성 확인하기
                    </button>
                    <button onclick="window.resetData()" class="text-slate-400 text-sm underline hover:text-white transition-colors bg-slate-800/50 px-4 py-2 rounded-full">입력된 데이터 전체 초기화</button>
                </div>
            `;
        };

        window.calculateTeams = async function() {
            let updatedPlayers = [];
            let validPlayerCount = 0;

            for (let i = 0; i < 16; i++) {
                const nameVal = document.getElementById(`name_${i}`).value.trim();
                const scoreVal = document.getElementById(`score_${i}`).value.trim();
                if (nameVal && nameVal !== '대기 중') {
                    validPlayerCount++;
                    updatedPlayers.push({ name: nameVal, score: scoreVal === '' ? 0 : parseInt(scoreVal, 10) });
                }
            }

            if(validPlayerCount < 16) {
                if(!confirm(`현재 ${validPlayerCount}명만 참여했습니다. 나머지 인원은 0점으로 처리됩니다. 계속할까요?`)) return;
            }

            const sortedPlayers = [...updatedPlayers].sort((a, b) => b.score - a.score);
            let teams = {
                1: { id: 1, title: "1팀", emoji: "🐯", members: [], totalScore: 0 },
                2: { id: 2, title: "2팀", emoji: "🦅", members: [], totalScore: 0 },
                3: { id: 3, title: "3팀", emoji: "🐻", members: [], totalScore: 0 },
                4: { id: 4, title: "4팀", emoji: "🦖", members: [], totalScore: 0 }
            };

            const maxPerTeam = Math.ceil(sortedPlayers.length / 4);

            sortedPlayers.forEach((player, index) => {
                player.internalRank = index + 1;
                const availableTeams = Object.values(teams).filter(t => t.members.length < maxPerTeam);
                availableTeams.sort((a, b) => a.totalScore - b.totalScore || a.id - b.id);
                
                const targetTeam = availableTeams[0];
                if(targetTeam) {
                    targetTeam.members.push(player);
                    targetTeam.totalScore += player.score;
                }
            });

            const teamRankings = Object.values(teams).sort((a, b) => b.totalScore - a.totalScore);
            teamRankings.forEach((team, idx) => { team.finalRank = idx + 1; });
            const userRankMap = {};
            teamRankings.forEach(team => { team.members.forEach(m => { userRankMap[m.name] = team.finalRank; }); });

            try {
                await setDoc(resultDocRef, { 
                    rankData: userRankMap, 
                    lastUpdate: new Date().getTime(),
                    teamDetails: teamRankings,
                    isFinal: false
                });
                
                localStorage.setItem('calculated_teams', JSON.stringify(teams));
                window.currentTeams = teams;
                window.renderResultScreen(teams);
            } catch (e) {
                alert("팀 배정 저장 중 오류가 발생했습니다.");
            }
        };

        window.renderResultScreen = function(teams) {
            window.currentView = 'result';
            window.scrollTo(0, 0); 

            let teamsHTML = '';
            [1, 2, 3, 4].forEach((teamId) => {
                const team = teams[teamId];
                let membersHTML = team.members.map(m => `
                    <div class="flex justify-between items-center bg-slate-900/80 p-3 rounded-xl border border-slate-700/50 mb-2">
                        <div class="flex items-center">
                            <span class="text-white font-bold text-lg comic-font">${m.name}</span>
                            <span class="rank-badge text-slate-400 text-[10px] px-1.5 py-0.5 rounded font-bold ml-2">성적 ${m.internalRank}위</span>
                        </div>
                        <span class="text-blue-400 font-black">${m.score}점</span>
                    </div>
                `).join('');

                const teamStyles = {
                    1: { color: "text-yellow-400", border: "border-yellow-500/50" },
                    2: { color: "text-slate-300", border: "border-slate-300/50" },
                    3: { color: "text-amber-500", border: "border-amber-600/50" },
                    4: { color: "text-emerald-400", border: "border-emerald-500/50" }
                };
                const style = teamStyles[team.id];

                teamsHTML += `
                    <div class="bg-slate-800 p-5 rounded-3xl border-2 ${style.border} shadow-2xl pop-up">
                        <div class="flex justify-between items-end mb-4 border-b border-slate-700 pb-3">
                            <h2 class="${style.color} text-2xl font-black comic-font flex items-center gap-2">
                                ${team.emoji} ${team.title}
                            </h2>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-400 font-bold">팀 전력 지수</p>
                                <p class="text-white font-black text-xl">${team.totalScore}<span class="text-sm font-normal ml-0.5 opacity-50">pt</span></p>
                            </div>
                        </div>
                        <div>${membersHTML}</div>
                    </div>
                `;
            });

            appDiv.innerHTML = `
                <div class="text-center mb-8 fade-in pt-6">
                    <button onclick="window.renderInputScreen()" class="text-slate-400 hover:text-white text-sm bg-slate-800 px-5 py-2.5 rounded-full mb-6 font-bold transition-all shadow-md">◀ 점수 다시 수정하기</button>
                    <h2 class="text-xl font-bold text-blue-400 mb-2 comic-font tracking-widest animate-pulse">밸런스 배정 완료!</h2>
                    <h1 class="text-4xl md:text-5xl title-font text-white mb-2 leading-tight">제 2차전 팀 확인</h1>
                    <p class="text-slate-400 text-sm">경기 시작 전 본인의 팀과 팀원들의 구성을 확인하세요.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">${teamsHTML}</div>
                <div class="text-center pb-12 fade-in flex flex-col items-center gap-6">
                    <p class="comic-font text-2xl text-blue-400">"박빙의 승부! 최고의 팀워크를 보여주세요!"</p>
                    <button onclick="window.renderRound2InputScreen()" class="btn-glow bg-gradient-to-r from-pink-500 to-rose-600 text-white font-black py-5 px-10 rounded-2xl text-2xl hover:scale-105 active:scale-95 transition-all w-full md:w-auto shadow-2xl mt-4 border border-pink-400/50 flex flex-col items-center">
                        <span class="text-sm font-bold text-pink-200 mb-1 font-sans">경기가 모두 끝났다면?</span>
                        <span>🎳 2차전 최종 점수 입력하기 ◀</span>
                    </button>
                </div>
            `;
        };

        window.renderRound2InputScreen = function() {
            window.currentView = 'round2_input';
            window.scrollTo(0, 0);

            if (!window.currentTeams) {
                const saved = localStorage.getItem('calculated_teams');
                if (saved) {
                    window.currentTeams = JSON.parse(saved);
                } else {
                    return window.renderInputScreen(); 
                }
            }

            let html = '';
            [1, 2, 3, 4].forEach(teamId => {
                const team = window.currentTeams[teamId];
                let membersHTML = '';
                
                team.members.forEach((m, idx) => {
                    const r2Score = window.round2Scores[m.name] !== undefined ? window.round2Scores[m.name] : '';
                    membersHTML += `
                        <div class="flex items-center justify-between bg-slate-900/90 p-3 rounded-xl border border-slate-700 mb-2 focus-within:border-pink-500 transition-colors">
                            <div class="flex flex-col">
                                <span class="text-white font-bold text-lg comic-font">${m.name}</span>
                                <span class="text-slate-400 text-xs font-bold">1차전: <span class="text-blue-300">${m.score}점</span></span>
                            </div>
                            <div class="flex items-center gap-2">
                                <input type="number" id="r2_score_${teamId}_${idx}" value="${r2Score}" oninput="window.saveRound2Score('${m.name}', this.value)" class="w-24 bg-slate-950 text-pink-400 font-black text-2xl text-center rounded-lg py-2 outline-none border border-slate-700 focus:border-pink-500 transition-colors" placeholder="점수">
                                <span class="text-slate-400 font-bold">점</span>
                            </div>
                        </div>
                    `;
                });

                const teamStyles = {
                    1: { color: "text-yellow-400", border: "border-yellow-500/30" },
                    2: { color: "text-slate-300", border: "border-slate-300/30" },
                    3: { color: "text-amber-500", border: "border-amber-600/30" },
                    4: { color: "text-emerald-400", border: "border-emerald-500/30" }
                };
                const style = teamStyles[team.id];

                html += `
                    <div class="bg-slate-800 p-4 rounded-3xl border ${style.border} shadow-lg mb-6">
                        <h2 class="${style.color} text-xl font-black comic-font mb-3 flex items-center gap-2">
                            ${team.emoji} ${team.title}
                        </h2>
                        <div>${membersHTML}</div>
                    </div>
                `;
            });

            appDiv.innerHTML = `
                <div class="text-center mb-8 fade-in pt-6">
                    <button onclick="window.renderResultScreen(window.currentTeams)" class="text-slate-400 hover:text-white text-sm bg-slate-800 px-5 py-2.5 rounded-full mb-6 font-bold transition-all shadow-md">◀ 팀 화면으로 돌아가기</button>
                    <p class="text-pink-400 font-bold tracking-widest mb-2 comic-font text-xl animate-pulse">마지막 승부!</p>
                    <h1 class="text-4xl md:text-5xl title-font text-white mb-4 leading-tight">2차전 점수 입력</h1>
                    <p class="text-slate-400 text-sm bg-slate-800/50 inline-block px-4 py-2 rounded-full border border-slate-700">
                        기록된 1차전 점수와 <strong class="text-pink-400">2차전 점수가 합산</strong>되어 최종 등수가 결정됩니다.
                    </p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 fade-in">
                    ${html}
                </div>
                <div class="flex flex-col items-center gap-5 pb-12 fade-in mt-8">
                    <button onclick="window.calculateFinalResults()" class="btn-glow bg-gradient-to-r from-yellow-500 to-orange-500 text-white font-black py-4 px-12 rounded-full text-xl hover:scale-105 active:scale-95 transition-all w-full md:w-auto shadow-xl">
                        🏆 최종 순위 발표 확인하기
                    </button>
                </div>
            `;
        };

        window.calculateFinalResults = async function() {
            let hasEmpty = false;
            let finalTeams = JSON.parse(JSON.stringify(window.currentTeams)); 

            [1, 2, 3, 4].forEach(teamId => {
                let finalTeamTotal = 0;
                finalTeams[teamId].members.forEach((m, idx) => {
                    const r2Val = document.getElementById(`r2_score_${teamId}_${idx}`).value.trim();
                    if (r2Val === '') hasEmpty = true;
                    
                    m.r2Score = r2Val === '' ? 0 : parseInt(r2Val, 10);
                    m.finalScore = m.score + m.r2Score; 
                    finalTeamTotal += m.finalScore;
                });
                finalTeams[teamId].finalTotalScore = finalTeamTotal;
            });

            if (hasEmpty) {
                if (!confirm("2차전 점수가 입력되지 않은 인원이 있습니다. 0점으로 처리됩니다. 계속할까요?")) return;
            }

            const teamRankings = Object.values(finalTeams).sort((a, b) => b.finalTotalScore - a.finalTotalScore);
            teamRankings.forEach((team, idx) => { team.finalRank = idx + 1; });

            const userRankMap = {};
            teamRankings.forEach(team => {
                team.members.forEach(m => { userRankMap[m.name] = team.finalRank; });
            });

            try {
                await setDoc(resultDocRef, { 
                    rankData: userRankMap, 
                    lastUpdate: new Date().getTime(),
                    teamDetails: teamRankings,
                    isFinal: true 
                });
                
                window.renderFinalResultScreen(teamRankings);
            } catch (e) {
                alert("최종 결과 저장 중 오류가 발생했습니다.");
            }
        };

        // ==========================================
        // 5. 최종 순위 발표 화면 (팀 이름 및 이모지 크기 대폭 상향)
        // ==========================================
        window.renderFinalResultScreen = function(teamRankings) {
            window.currentView = 'final_result';
            window.scrollTo(0, 0); 

            let allPlayers = [];
            teamRankings.forEach(team => {
                team.members.forEach(m => { allPlayers.push(m); });
            });
            allPlayers.sort((a, b) => b.finalScore - a.finalScore);
            allPlayers.forEach((p, idx) => { p.individualOverallRank = idx + 1; });

            let teamsHTML = '';
            teamRankings.forEach((team) => {
                let membersHTML = team.members.map(m => `
                    <div class="flex flex-col bg-slate-900/80 p-4 rounded-xl border border-slate-700/50 mb-3 shadow-inner">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-white font-bold text-xl comic-font">${m.name}</span>
                            <span class="bg-slate-700 text-slate-300 text-[11px] px-2 py-0.5 rounded-full font-bold">개인 ${m.individualOverallRank}위</span>
                        </div>
                        <div class="flex justify-between items-center text-[13px] md:text-sm font-bold bg-black/30 p-2 rounded-lg">
                            <span class="text-slate-400">1차전 <span class="text-blue-400 text-base ml-1">${m.score}</span>점</span>
                            <span class="text-slate-600 font-black">+</span>
                            <span class="text-slate-400">2차전 <span class="text-pink-400 text-base ml-1">${m.r2Score}</span>점</span>
                            <span class="text-slate-600 font-black">=</span>
                            <span class="text-yellow-400">최종 <span class="text-lg md:text-xl ml-1 font-black">${m.finalScore}</span>점</span>
                        </div>
                    </div>
                `).join('');

                let rankStyle = '';
                let rankLabel = '';
                if(team.finalRank === 1) { rankStyle = "text-yellow-400 border-yellow-500 shadow-[0_0_30px_rgba(234,179,8,0.3)]"; rankLabel = "🥇 1위"; }
                else if(team.finalRank === 2) { rankStyle = "text-slate-300 border-slate-400"; rankLabel = "🥈 2위"; }
                else if(team.finalRank === 3) { rankStyle = "text-amber-500 border-amber-600"; rankLabel = "🥉 3위"; }
                else { rankStyle = "text-emerald-400 border-emerald-500"; rankLabel = "😅 4위"; }

                // 🚨 [수정 포인트] 팀 이름(h2)과 이모지의 크기를 키우고, 오른쪽 등수 배지와 균형을 맞췄습니다.
                teamsHTML += `
                    <div class="bg-slate-800 p-6 rounded-3xl border-2 ${rankStyle} pop-up relative overflow-hidden mb-8">
                        <!-- 오른쪽 상단 등수 표시 박스 (크기 및 여백 조정) -->
                        <div class="absolute top-0 right-0 bg-black/50 px-6 py-3 rounded-bl-3xl font-black text-2xl text-white backdrop-blur-md z-20 border-l border-b border-white/10 shadow-lg">
                            ${rankLabel}
                        </div>
                        
                        <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-5 pt-8">
                            <!-- 🔥 팀 이름 및 이모지 크기 대폭 확대 (text-5xl) -->
                            <h2 class="${rankStyle.split(' ')[0]} text-4xl md:text-5xl font-black comic-font flex items-center gap-4 relative z-10 drop-shadow-lg">
                                <span class="text-5xl md:text-6xl">${team.emoji}</span>
                                <span>${team.title}</span>
                            </h2>
                            
                            <div class="text-right relative z-10">
                                <p class="text-[12px] text-slate-300 font-bold bg-slate-900/80 px-3 py-1 rounded-full mb-1 inline-block border border-slate-700">팀 최종 합계</p>
                                <p class="text-white font-black text-4xl md:text-5xl drop-shadow-xl">${team.finalTotalScore}<span class="text-lg font-normal ml-1 opacity-70">점</span></p>
                            </div>
                        </div>
                        
                        <div class="relative z-10">${membersHTML}</div>
                    </div>
                `;
            });

            appDiv.innerHTML = `
                <div class="text-center mb-8 fade-in pt-6">
